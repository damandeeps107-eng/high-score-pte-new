<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful | High Score PTE</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #3b2fcd;
      --primary-light: #5a4ee4;
      --success: #10b981;
      --text-main: #0c0b24;
      --text-muted: #53526c;
      --border-light: #e6e5f3;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Public Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      color: var(--text-main);
      background-color: #f8f8fc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background blobs to match high-score-pte theme */
    body::before {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(59, 47, 205, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
      top: -100px;
      left: -100px;
      z-index: -1;
    }

    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 189, 18, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
      bottom: -100px;
      right: -100px;
      z-index: -1;
    }

    .success-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(230, 229, 243, 0.7);
      padding: 40px 32px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(59, 47, 205, 0.08);
      text-align: center;
      max-width: 460px;
      width: 100%;
      z-index: 1;
      transform: translateY(20px);
      animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes slideUp {
      to {
        transform: translateY(0);
      }
    }

    /* Elegant Animated Checkmark */
    .checkmark-wrapper {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      position: relative;
    }

    .checkmark-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.1);
      border: 3px solid var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .checkmark-icon {
      font-size: 42px;
      color: var(--success);
      transform: scale(0);
      animation: popIn 0.4s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
    }

    @keyframes scaleIn {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes popIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    h1 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    /* Details Container */
    .receipt-details {
      background: #fcfcff;
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 20px;
      margin: 28px 0;
      text-align: left;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .detail-row:last-child {
      margin-bottom: 0;
      padding-top: 12px;
      border-top: 1px dashed var(--border-light);
      font-weight: 700;
      font-size: 16px;
    }

    .label {
      color: var(--text-muted);
    }

    .val {
      color: var(--text-main);
      font-weight: 500;
    }

    .payment-id-val {
      font-family: monospace;
      color: var(--primary);
      background: rgba(59, 47, 205, 0.05);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Redirection footer info */
    .redirect-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 500;
      background: rgba(59, 47, 205, 0.05);
      padding: 12px;
      border-radius: 12px;
      border: 1px dashed rgba(59, 47, 205, 0.2);
    }

    .spinner {
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      background: #25d366; /* WhatsApp Green */
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
      transition: all 0.3s ease;
      width: 100%;
    }

    .action-btn:hover {
      background: #20ba59;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);
    }
  </style>
</head>
<body>

  <div class="success-card">
    <div class="checkmark-wrapper">
      <div class="checkmark-circle">
        <i class="fa-solid fa-check checkmark-icon"></i>
      </div>
    </div>
    
    <h1>Payment Successful!</h1>
    <p>Your transaction has been verified securely.</p>
    
    <div class="receipt-details">
      <div class="detail-row">
        <span class="label">Program Name</span>
        <span class="val" id="plan-name">-</span>
      </div>
      <div class="detail-row">
        <span class="label">Transaction ID</span>
        <span class="val payment-id-val" id="payment-id">-</span>
      </div>
      <div class="detail-row">
        <span class="label">Status</span>
        <span class="val" style="color: var(--success);"><i class="fa-solid fa-circle-check"></i> Success</span>
      </div>
      <div class="detail-row">
        <span class="label">Amount Paid</span>
        <span class="val" id="amount-paid">₹0</span>
      </div>
    </div>

    <div class="redirect-status">
      <i class="fa-solid fa-circle-notch spinner"></i>
      <span>Redirecting to WhatsApp in <span id="timer-val">3</span>s...</span>
    </div>

    <a id="whatsapp-fallback-btn" href="#" class="action-btn">
      <i class="fa-brands fa-whatsapp"></i> Redirect Manually
    </a>
  </div>

  <script>
    // Get query params from URL
    const urlParams = new URLSearchParams(window.location.search);
    const paymentId = urlParams.get('payment_id') || 'N/A';
    const planName = urlParams.get('plan') || 'PTE Course Program';
    const amount = urlParams.get('amount') || '0';

    // Populate the UI
    document.getElementById('plan-name').textContent = planName;
    document.getElementById('payment-id').textContent = paymentId;
    document.getElementById('amount-paid').textContent = '₹' + parseInt(amount).toLocaleString('en-IN');

    // Message preparation
    const messageText = `Hello High Score PTE!\n\nI have successfully enrolled in the *${planName}* program online.\n\n*Receipt Details:*\n• Plan: ${planName}\n• Paid Amount: ₹${amount}\n• Transaction ID: ${paymentId}\n\nPlease verify and activate my course access!`;
    const whatsappUrl = `https://wa.me/918360990936?text=${encodeURIComponent(messageText)}`;

    // Set fallback button URL
    document.getElementById('whatsapp-fallback-btn').href = whatsappUrl;

    // Auto-redirect timer logic
    let secondsLeft = 3;
    const timerVal = document.getElementById('timer-val');

    const countdownInterval = setInterval(() => {
      secondsLeft--;
      timerVal.textContent = secondsLeft;

      if (secondsLeft <= 0) {
        clearInterval(countdownInterval);
        window.location.href = whatsappUrl;
      }
    }, 1000);
  </script>
</body>
</html>
